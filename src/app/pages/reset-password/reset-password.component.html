<div class="reset-container">
    <div class="reset-card">
        <div class="reset-header">
            <div class="logo">
                <div class="logo-text">VIRA</div>
            </div>
            <h1 class="reset-title">{{ title }}</h1>
            <p class="reset-subtitle">{{ subtitle }}</p>
        </div>

        <form class="reset-form" (ngSubmit)="onSubmit()">
            <div *ngIf="errorMessage" class="error-message">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                {{ errorMessage }}
            </div>

            <div *ngIf="successMessage" class="success-message">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 6 9 17l-5-5"></path>
                </svg>
                {{ successMessage }}
            </div>

            <div class="form-group">
                <label class="form-label" for="newPassword">Nueva Contraseña</label>
                <input type="password" id="newPassword" class="form-input" [(ngModel)]="newPassword" name="newPassword"
                    placeholder="Minimo 8 caracteres" required autocomplete="new-password">
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmPassword">Confirmar Contraseña</label>
                <input type="password" id="confirmPassword" class="form-input" [(ngModel)]="confirmPassword" name="confirmPassword"
                    placeholder="Repite la nueva contraseña" required autocomplete="new-password">
            </div>

            <button type="submit" class="reset-btn" [disabled]="loading || !token">
                <span *ngIf="!loading">Guardar Nueva Contraseña</span>
                <span *ngIf="loading" class="loading-text">
                    <svg class="spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" stroke-dasharray="60" stroke-dashoffset="20"></circle>
                    </svg>
                    Guardando...
                </span>
            </button>

            <button type="button" class="link-btn" (click)="navigateToLogin()">
                Volver al login
            </button>
        </form>
    </div>
</div>
