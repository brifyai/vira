<div class="mis-noticieros-container">
    <div class="header">
        <h1>Mis Noticieros</h1>
        <p>Historial de noticieros generados y exportados</p>
    </div>

    <div class="loading-state" *ngIf="loading">
        <div class="spinner"></div>
        <p>Cargando noticieros...</p>
    </div>

    <div class="empty-state" *ngIf="!loading && broadcasts.length === 0">
        <p>No has generado ningún noticiero aún.</p>
    </div>

    <div class="broadcasts-grid" *ngIf="!loading && broadcasts.length > 0">
        <div class="broadcast-card" *ngFor="let broadcast of broadcasts">
            <div class="card-header">
                <h3>{{ broadcast.title }}</h3>
                <span class="date">{{ formatDate(broadcast.created_at) }}</span>
            </div>
            
            <div class="card-body">
                <div class="info-row">
                    <span class="label">Duración:</span>
                    <span class="value">{{ formatDuration(broadcast.duration_seconds) }}</span>
                </div>
                
                <div class="audio-player">
                    <audio [src]="broadcast.audio_url" controls controlsList="nodownload"></audio>
                </div>
            </div>

            <div class="card-footer">
                <a [href]="broadcast.audio_url" [download]="broadcast.title + '.wav'" class="download-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Descargar
                </a>
                <button class="delete-btn" (click)="deleteBroadcast(broadcast.id)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>
